name: Feature Request
description: Suggest a new controller, scenario, or contributor-facing improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature and the problem it solves.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Why it matters
      description: Explain the expected value for learners or contributors.
