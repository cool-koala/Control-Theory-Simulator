name: Bug Report
description: Report a reproducible bug in the simulator or site.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Select controller ...
        2. Set parameter ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / environment
